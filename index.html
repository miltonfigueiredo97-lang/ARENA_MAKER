<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0f17">
  <title>Arena Maker V6 — Montador de Campeonatos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-symbol">A</div>
        <div class="brand-copy">
          <strong>Arena Maker</strong>
          <span>Gerenciador de campeonatos</span>
        </div>
      </div>

      <nav class="nav" aria-label="Navegação principal">
        <button class="nav-item active" data-view="tournaments">
          <span class="nav-icon">▦</span>
          <span>Campeonatos</span>
        </button>
        <button class="nav-item" data-view="importer">
          <span class="nav-icon">⇧</span>
          <span>Publicar atualização</span>
        </button>
      </nav>

      <div class="sidebar-foot">
        <div id="syncStatus" class="sync-status">
          <span class="sync-dot"></span>
          <div><strong>Carregando</strong><span>Verificando banco</span></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="eyebrow" id="viewEyebrow">COMPETIÇÕES</div>
          <h1 id="viewTitle">Campeonatos</h1>
          <p id="viewSubtitle">Crie formatos livres, sorteie confrontos e registre os resultados.</p>
        </div>
        <div class="top-actions">
          <button id="newTournamentBtn" class="button primary">+ Novo campeonato</button>
        </div>
      </header>

      <section id="view-tournaments" class="view active"></section>
      <section id="view-importer" class="view"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="assets/app.js" defer></script>
</body>
</html>
